<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencatat Keuangan Sederhana</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 font-sans p-6">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">💰 Tracker Keuangan Pribadi</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-green-100 p-4 rounded-lg shadow border-l-4 border-green-500">
                <p class="text-sm text-green-700 font-semibold uppercase">Total Masuk</p>
                <p id="total-masuk" class="text-2xl font-bold text-green-900">Rp 0</p>
            </div>
            <div class="bg-red-100 p-4 rounded-lg shadow border-l-4 border-red-500">
                <p class="text-sm text-red-700 font-semibold uppercase">Total Keluar</p>
                <p id="total-keluar" class="text-2xl font-bold text-red-900">Rp 0</p>
            </div>
            <div class="bg-blue-100 p-4 rounded-lg shadow border-l-4 border-blue-500">
                <p class="text-sm text-blue-700 font-semibold uppercase">Sisa Saldo</p>
                <p id="sisa-saldo" class="text-2xl font-bold text-blue-900">Rp 0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-lg shadow-md h-fit">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Tambah Transaksi</h2>
                <form id="form-transaksi" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Jenis</label>
                        <select id="jenis" class="mt-1 block w-full p-2 border border-gray-300 rounded bg-white" required>
                            <option value="masuk">Uang Masuk (+)</option>
                            <option value="keluar">Uang Keluar (-)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Metode</label>
                        <select id="metode" class="mt-1 block w-full p-2 border border-gray-300 rounded bg-white" required>
                            <option value="cash">💵 Cash</option>
                            <option value="qris">📱 QRIS</option>
                            <option value="transfer">🏦 Transfer</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Jumlah (Rp)</label>
                        <input type="number" id="jumlah" class="mt-1 block w-full p-2 border border-gray-300 rounded" placeholder="Contoh: 50000" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Tanggal</label>
                        <input type="date" id="tanggal" class="mt-1 block w-full p-2 border border-gray-300 rounded" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Keterangan</label>
                        <textarea id="keterangan" class="mt-1 block w-full p-2 border border-gray-300 rounded" rows="2" placeholder="Beli kopi, jajan, gaji..." required></textarea>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded font-semibold hover:bg-blue-700 transition">Simpan</button>
                </form>
            </div>

            <div class="md:col-span-2 bg-white p-6 rounded-lg shadow-md flex flex-col justify-between">
                <div>
                    <h2 class="text-xl font-semibold mb-4 text-gray-700">Riwayat Transaksi</h2>
                    
                    <div class="mb-4 grid grid-cols-1 sm:grid-cols-3 gap-2">
                        <input type="text" id="search-input" placeholder="🔍 Cari keterangan..." class="p-2 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500">
                        <select id="filter-jenis" class="p-2 text-sm border border-gray-300 rounded bg-white">
                            <option value="semua">Semua Jenis</option>
                            <option value="masuk">Uang Masuk</option>
                            <option value="keluar">Uang Keluar</option>
                        </select>
                        <select id="filter-metode" class="p-2 text-sm border border-gray-300 rounded bg-white">
                            <option value="semua">Semua Metode</option>
                            <option value="cash">💵 Cash</option>
                            <option value="qris">📱 QRIS</option>
                            <option value="transfer">🏦 Transfer</option>
                        </select>
                    </div>

                    <div class="overflow-x-auto min-h-[400px]">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tanggal</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Keterangan</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Jenis</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Metode</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Jumlah</th>
                                </tr>
                            </table>
                            <table class="min-w-full divide-y divide-gray-200">
                                <tbody id="tabel-body" class="bg-white divide-y divide-gray-200 text-sm">
                                    </tbody>
                            </table>
                        </div>
                </div>

                <div class="mt-4 flex flex-col sm:flex-row justify-between items-center text-sm text-gray-600 border-t pt-4 gap-2">
                    <span id="info-halaman">Menampilkan halaman 1 dari 1</span>
                    <div class="space-x-2">
                        <button id="btn-prev" class="px-3 py-1 bg-gray-200 rounded disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-300 transition" disabled>Sebelumnya</button>
                        <button id="btn-next" class="px-3 py-1 bg-gray-200 rounded disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-300 transition" disabled>Selanjutnya</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. KONFIGURASI SUPABASE
        const SUPABASE_URL = "https://nuuamztikfvnungnlvxv.supabase.co";
        const SUPABASE_KEY = "sb_publishable_x7ZsRKFAF9xLf8gV4s-m-A_Jh6zUY7e";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Elemen HTML
        const formTransaksi = document.getElementById('form-transaksi');
        const tabelBody = document.getElementById('tabel-body');
        const totalMasukEl = document.getElementById('total-masuk');
        const totalKeluarEl = document.getElementById('total-keluar');
        const sisaSaldoEl = document.getElementById('sisa-saldo');

        // State Global Aplikasi
        let semuaData = [];      
        let dataFilter = [];     
        let halamanSekarang = 1; 
        const barisPerHalaman = 10; 

        // Set tanggal default form ke hari ini
        document.getElementById('tanggal').value = new Date().toISOString().split('T')[0];

        function formatMetode(metode) {
            if (!metode) return '-';
            const badgeStyle = "px-2 py-0.5 inline-flex text-xs font-medium rounded border ";
            switch(metode.toLowerCase()) {
                case 'cash': return `<span class="${badgeStyle} bg-amber-50 text-amber-700 border-amber-200">💵 Cash</span>`;
                case 'qris': return `<span class="${badgeStyle} bg-purple-50 text-purple-700 border-purple-200">📱 QRIS</span>`;
                case 'transfer': return `<span class="${badgeStyle} bg-blue-50 text-blue-700 border-blue-200">🏦 Transfer</span>`;
                default: return metode;
            }
        }

        // 2. FUNGSI UTAMA AMBIL DATA DARI SUPABASE
        async function ambilData() {
            let { data: transaksi, error } = await supabaseClient
                .from('transaksi')
                .select('*')
                .order('tanggal', { ascending: false });

            if (error) {
                console.error('Gagal mengambil data:', error);
                return;
            }

            semuaData = transaksi || []; 
            
            // Hitung ringkasan total dashboard
            let totalMasuk = 0;
            let totalKeluar = 0;
            semuaData.forEach(item => {
                if (item.jenis === 'masuk') totalMasuk += item.jumlah;
                else totalKeluar += item.jumlah;
            });

            totalMasukEl.innerText = `Rp ${totalMasuk.toLocaleString('id-ID')}`;
            totalKeluarEl.innerText = `Rp ${totalKeluar.toLocaleString('id-ID')}`;
            sisaSaldoEl.innerText = `Rp ${(totalMasuk - totalKeluar).toLocaleString('id-ID')}`;

            // Jalankan pemrosesan filter data & render tabel
            prosesFilterDanRender();
        }

        // 3. FUNGSI UNTUK MEMPROSES SEARCH, FILTER, & PAGINASI
        function prosesFilterDanRender() {
            const kataKunci = document.getElementById('search-input').value.toLowerCase();
            const filterJenis = document.getElementById('filter-jenis').value;
            const filterMetode = document.getElementById('filter-metode').value;

            // A. Proses Filter & Search
            dataFilter = semuaData.filter(item => {
                const cocokKataKunci = item.keterangan ? item.keterangan.toLowerCase().includes(kataKunci) : false;
                const cocokJenis = filterJenis === 'semua' || item.jenis === filterJenis;
                const cocokMetode = filterMetode === 'semua' || (item.metode && item.metode.toLowerCase() === filterMetode);
                return cocokKataKunci && cocokJenis && cocokMetode;
            });

            // B. Proses Hitung Paginasi (Maksimal 10 Baris)
            const totalHalaman = Math.ceil(dataFilter.length / barisPerHalaman) || 1;
            if (halamanSekarang > totalHalaman) halamanSekarang = totalHalaman;

            const indeksAwal = (halamanSekarang - 1) * barisPerHalaman;
            const indeksAkhir = indeksAwal + barisPerHalaman;
            const dataHalamanIni = dataFilter.slice(indeksAwal, indeksAkhir);

            // C. Render ke Tabel HTML
            tabelBody.innerHTML = '';
            if (dataHalamanIni.length === 0) {
                tabelBody.innerHTML = `<tr><td colspan="5" class="px-4 py-8 text-center text-gray-400 italic">Data tidak ditemukan atau masih kosong</td></tr>`;
            } else {
                dataHalamanIni.forEach(item => {
                    const nominal = item.jumlah;
                    const isMasuk = item.jenis === 'masuk';

                    const row = document.createElement('tr');
                    row.className = "hover:bg-gray-50 transition-colors";
                    row.innerHTML = `
                        <td class="px-4 py-3 whitespace-nowrap text-gray-600">${item.tanggal}</td>
                        <td class="px-4 py-3 text-gray-900 font-medium">${item.keterangan}</td>
                        <td class="px-4 py-3">
                            <span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full ${isMasuk ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                                ${item.jenis.toUpperCase()}
                            </span>
                        </td>
                        <td class="px-4 py-3 whitespace-nowrap">${formatMetode(item.metode)}</td>
                        <td class="px-4 py-3 text-right font-semibold ${isMasuk ? 'text-green-600' : 'text-red-600'}">
                            ${isMasuk ? '+' : '-'} Rp ${nominal.toLocaleString('id-ID')}
                        </td>
                    `;
                    tabelBody.appendChild(row);
                });
            }

            // D. Perbarui Tampilan Navigasi Halaman
            document.getElementById('info-halaman').innerText = `Menampilkan halaman ${halamanSekarang} dari ${totalHalaman} (${dataFilter.length} data)`;
            document.getElementById('btn-prev').disabled = halamanSekarang === 1;
            document.getElementById('btn-next').disabled = halamanSekarang === totalHalaman;
        }

        // --- EVENT LISTENERS UNTUK SEARCH & FILTER (Real-time tanpa refresh) ---
        document.getElementById('search-input').addEventListener('input', () => { halamanSekarang = 1; prosesFilterDanRender(); });
        document.getElementById('filter-jenis').addEventListener('change', () => { halamanSekarang = 1; prosesFilterDanRender(); });
        document.getElementById('filter-metode').addEventListener('change', () => { halamanSekarang = 1; prosesFilterDanRender(); });

        // --- EVENT LISTENERS UNTUK TOMBOL PAGINASI ---
        document.getElementById('btn-prev').addEventListener('click', () => { if (halamanSekarang > 1) { halamanSekarang--; prosesFilterDanRender(); } });
        document.getElementById('btn-next').addEventListener('click', () => { if (halamanSekarang < Math.ceil(dataFilter.length / barisPerHalaman)) { halamanSekarang++; prosesFilterDanRender(); } });

        // 4. FUNGSI UNTUK MENYIMPAN TRANSAKSI BARU
        formTransaksi.addEventListener('submit', async (e) => {
            e.preventDefault();

            const jenis = document.getElementById('jenis').value;
            const metode = document.getElementById('metode').value;
            const jumlah = parseInt(document.getElementById('jumlah').value);
            const tanggal = document.getElementById('tanggal').value;
            const keterangan = document.getElementById('keterangan').value;

            const { error } = await supabaseClient
                .from('transaksi')
                .insert([{ jenis, metode, jumlah, tanggal, keterangan }]);

            if (error) {
                alert('Gagal menyimpan transaksi!');
                console.error(error);
            } else {
                formTransaksi.reset();
                document.getElementById('tanggal').value = new Date().toISOString().split('T')[0];
                ambilData(); 
            }
        });

        // Load data pertama kali dibuka
        ambilData();
    </script>
</body>
</html>
